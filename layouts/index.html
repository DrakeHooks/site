<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>{{ .Site.Title }}</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #fff;
    }

    .container {
      position: absolute;
      top: 50%;
      left: 20px;                 
      transform: translateY(-50%);
      font-family: sans-serif;
      font-size: 0.9rem;          
      color: #000;
      opacity: 0;                 
      animation: fadeIn 1s forwards ease-in;
    }

    .container a {
      text-decoration: none;
      color: #000;
      margin: 0 0.75rem;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    @media (max-width: 600px) {
      .container {
        left: 5%;               
                
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="https://www.instagram.com/drake_hooks?igsh=b2QxMzhpdW1tams5&utm_source=qr">*</a>
    <a href="https://server.drakehooks.net">stream</a>
    <a href="https://blog.drakehooks.net/posts">blog</a>
    
  </div>
</body>
</html>
