<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>titanium</title>

  <style>
    :root {
      --bg: #000000;
      --fg: rgba(255,255,255,0.96);
      --muted: rgba(255,255,255,0.56);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: Helvetica, Arial, sans-serif;
      touch-action: none;
    }

    body {
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .topbar {
      position: absolute;
      top: 18px;
      left: 20px;
      right: 18px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: block;
      width: 100px;
      height: auto;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
    }

    .bottom-left {
      position: absolute;
      left: 20px;
      bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: auto;
      flex-wrap: wrap;
    }

    .text-btn {
      appearance: none;
      border: 0;
      background: transparent;
      padding: 0;
      margin: 0;
      color: rgba(255,255,255,0.96);
      font: inherit;
      font-size: 12px;
      line-height: 1;
      letter-spacing: 0.04em;
      text-transform: lowercase;
      cursor: pointer;
      opacity: 1;
      transition: opacity 180ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .text-btn:hover {
      opacity: 0.7;
    }

    .text-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    model-viewer#arLauncher {
      position: fixed;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      left: -9999px;
      top: -9999px;
    }

    @media (max-width: 700px) {
      .topbar {
        top: 14px;
        left: 16px;
        right: 14px;
      }

      .bottom-left {
        left: 16px;
        bottom: 14px;
        gap: 8px;
      }

      .logo {
        width: 72px;
      }
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.179.1/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.179.1/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>
  <div class="hud">
    <div class="topbar">
      <img
        src="./models/logo2.png"
        alt=""
        class="logo"
        onerror="this.style.display='none'"
      />
    </div>

    <div class="bottom-left">
      <button id="materialBtn" class="text-btn">titanium</button>
      <button id="formBtn" class="text-btn" disabled>form</button>
      <button id="viewBtn" class="text-btn">view</button>
    </div>
  </div>

  <model-viewer
    id="arLauncher"
    ar
    ar-modes="webxr quick-look"
    ar-scale="fixed"
    ar-placement="floor"
    camera-controls
    reveal="interaction"
    exposure="1"
    alt="AR preview">
  </model-viewer>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(0, 0, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.96;
    document.body.appendChild(renderer.domElement);

    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    const envRT = pmremGenerator.fromScene(new RoomEnvironment(renderer), 0.04);
    scene.environment = envRT.texture;

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enablePan = false;
    controls.minDistance = 1.5;
    controls.maxDistance = 30;
    controls.target.set(0, 0, 0);
    controls.touches = {
      ONE: THREE.TOUCH.ROTATE,
      TWO: THREE.TOUCH.DOLLY_PAN
    };

    const ambient = new THREE.AmbientLight(0xffffff, 1.0);
    scene.add(ambient);

    const hemi = new THREE.HemisphereLight(0xf5f2ed, 0x080808, 0.55);
    scene.add(hemi);

    const topKey = new THREE.DirectionalLight(0xffffff, 2.8);
    topKey.position.set(0, 8, 2);
    scene.add(topKey);

    const frontKey = new THREE.DirectionalLight(0xffffff, 1.45);
    frontKey.position.set(2, 3, 8);
    scene.add(frontKey);

    const fill = new THREE.DirectionalLight(0xffffff, 0.8);
    fill.position.set(-5, 1, 4);
    scene.add(fill);

    const rim = new THREE.DirectionalLight(0xffffff, 0.45);
    rim.position.set(0, 2, -8);
    scene.add(rim);

    const warmRim = new THREE.DirectionalLight(0xfff4ea, 0.0);
    warmRim.position.set(-2, 4, 6);
    scene.add(warmRim);

    const glowLight = new THREE.PointLight(0xffffff, 0, 0.75, 2.0);
    glowLight.visible = false;
    scene.add(glowLight);

    const loader = new GLTFLoader();

    const materialBtn = document.getElementById('materialBtn');
    const formBtn = document.getElementById('formBtn');
    const viewBtn = document.getElementById('viewBtn');
    const arLauncher = document.getElementById('arLauncher');

    let trayWrapper = null;
    let planterWrapper = null;

    let trayLoaded = false;
    let planterLoaded = false;

    let activeKey = 'tray';
    let currentMaterialMode = 'titanium';

    let trayDiffusers = [];
    let planterDiffusers = [];

    const AR_ASSETS = {
      tray: {
        glb: './models/tray.glb',
        usdz: './models/tray.usdz'
      },
      planter: {
        glb: './models/planter.glb',
        usdz: './models/planter.usdz'
      }
    };

    const titaniumMaterialTemplate = new THREE.MeshPhysicalMaterial({
      color: new THREE.Color(0x6f747b),
      metalness: 1.0,
      roughness: 0.72,
      envMapIntensity: 0.85,
      clearcoat: 0.01,
      clearcoatRoughness: 0.95
    });

    const porcelainMaterialTemplate = new THREE.MeshPhysicalMaterial({
      color: new THREE.Color(0xf6f2eb),
      metalness: 0.0,
      roughness: 0.18,
      envMapIntensity: 0.72,
      clearcoat: 0.85,
      clearcoatRoughness: 0.10,
      ior: 1.52,
      reflectivity: 0.55,
      sheen: 0.55,
      sheenColor: new THREE.Color(0xfffbf6),
      sheenRoughness: 0.42,
      specularIntensity: 0.9,
      specularColor: new THREE.Color(0xffffff),
      emissive: new THREE.Color(0x120f0b),
      emissiveIntensity: 0.035
    });

    function currentMaterialTemplate() {
      return currentMaterialMode === 'titanium'
        ? titaniumMaterialTemplate
        : porcelainMaterialTemplate;
    }

    function updateLightingForMaterial() {
      if (currentMaterialMode === 'porcelain') {
        renderer.toneMappingExposure = 1.02;
        ambient.intensity = 1.08;
        hemi.intensity = 0.72;
        topKey.intensity = 2.35;
        frontKey.intensity = 1.25;
        fill.intensity = 0.95;
        rim.intensity = 0.72;
        warmRim.intensity = 0.55;
      } else {
        renderer.toneMappingExposure = 0.96;
        ambient.intensity = 1.0;
        hemi.intensity = 0.55;
        topKey.intensity = 2.8;
        frontKey.intensity = 1.45;
        fill.intensity = 0.8;
        rim.intensity = 0.45;
        warmRim.intensity = 0.0;
      }
    }

    function makeDiffuserMaterial() {
      return new THREE.MeshPhysicalMaterial({
        color: new THREE.Color(0x3a3a3a),
        metalness: 0.0,
        roughness: 0.42,
        transmission: 0.04,
        thickness: 0.35,
        transparent: true,
        opacity: 0.95,
        ior: 1.45,
        envMapIntensity: 0.18,
        clearcoat: 0.6,
        clearcoatRoughness: 0.18,
        emissive: new THREE.Color(0xffffff),
        emissiveIntensity: 0.0
      });
    }

    function collectDiffusers(root) {
      const hits = [];
      root.traverse((child) => {
        if (!child.isMesh) return;
        const n = (child.name || '').toLowerCase();
        if (n.includes('led_diffuser') || n === 'leddiffuser' || n.includes('diffuser')) {
          hits.push(child);
        }
      });
      return hits;
    }

    function applyMaterialToObject(root, diffuserStore) {
      if (!root) return;

      const diffusers = collectDiffusers(root);
      diffuserStore.length = 0;
      diffuserStore.push(...diffusers);

      root.traverse((child) => {
        if (!child.isMesh) return;

        if (child.geometry) {
          child.geometry.computeVertexNormals();
        }

        const isDiffuser = diffusers.includes(child);

        if (isDiffuser) {
          child.material = makeDiffuserMaterial();
        } else {
          child.material = currentMaterialTemplate().clone();
        }

        child.castShadow = false;
        child.receiveShadow = false;
      });
    }

    function applyMaterialToAllLoadedObjects() {
      if (trayWrapper) applyMaterialToObject(trayWrapper, trayDiffusers);
      if (planterWrapper) applyMaterialToObject(planterWrapper, planterDiffusers);
      materialBtn.textContent = currentMaterialMode;
      updateLightingForMaterial();
    }

    function fitCameraToObject(object, zoomMultiplier = 1.7, yOffsetFactor = 0.12) {
      const box = new THREE.Box3().setFromObject(object);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z) || 1;

      const fov = camera.fov * (Math.PI / 180);
      let cameraZ = Math.abs((maxDim * 0.5) / Math.tan(fov * 0.5));
      cameraZ *= zoomMultiplier;

      const yOffset = maxDim * yOffsetFactor;

      camera.position.set(center.x, center.y + yOffset, cameraZ);
      controls.target.set(center.x, center.y + yOffset, center.z);

      camera.near = 0.01;
      camera.far = Math.max(100, maxDim * 20);
      camera.updateProjectionMatrix();
      controls.update();
    }

    function buildWrapper(model, rotation, targetSize, diffuserStore) {
      const boxBefore = new THREE.Box3().setFromObject(model);
      const centerBefore = boxBefore.getCenter(new THREE.Vector3());
      model.position.sub(centerBefore);

      const wrapper = new THREE.Group();
      wrapper.add(model);
      wrapper.rotation.set(...rotation);
      wrapper.userData.baseRotation = new THREE.Euler(...rotation);
      scene.add(wrapper);

      applyMaterialToObject(model, diffuserStore);

      const box = new THREE.Box3().setFromObject(wrapper);
      const size = box.getSize(new THREE.Vector3());
      const maxAxis = Math.max(size.x, size.y, size.z) || 1;
      const scale = targetSize / maxAxis;
      wrapper.scale.setScalar(scale);

      return wrapper;
    }

    function fitActiveModel() {
      const active = activeKey === 'tray' ? trayWrapper : planterWrapper;
      if (!active) return;

      if (activeKey === 'tray') {
        const isMobile = window.innerWidth <= 700;
        fitCameraToObject(active, isMobile ? 1.92 : 1.62, 0.12);
      } else {
        fitCameraToObject(active, 2.15, 0.10);
      }
    }

    function updateFormState() {
      formBtn.disabled = !(trayLoaded && planterLoaded);
    }

    function setActiveModel(key) {
      activeKey = key;

      if (trayWrapper) trayWrapper.visible = key === 'tray';
      if (planterWrapper) planterWrapper.visible = key === 'planter';

      fitActiveModel();
      syncARLauncher();
    }

    function toggleForm() {
      if (!(trayLoaded && planterLoaded)) return;
      setActiveModel(activeKey === 'tray' ? 'planter' : 'tray');
    }

    function toggleMaterial() {
      currentMaterialMode = currentMaterialMode === 'titanium' ? 'porcelain' : 'titanium';
      applyMaterialToAllLoadedObjects();
    }

    function isIOS() {
      return /iPhone|iPad|iPod/i.test(navigator.userAgent);
    }

    function syncARLauncher() {
      const asset = AR_ASSETS[activeKey];
      if (!asset) return;

      arLauncher.src = asset.glb;

      if (asset.usdz) {
        arLauncher.setAttribute('ios-src', asset.usdz);
      } else {
        arLauncher.removeAttribute('ios-src');
      }
    }

    async function launchAR() {
      syncARLauncher();

      if (isIOS()) {
        const asset = AR_ASSETS[activeKey];
        if (!asset?.usdz) {
          alert('iPhone AR needs a properly scaled .usdz file for this object.');
          return;
        }
      }

      try {
        if (typeof arLauncher.activateAR === 'function') {
          await arLauncher.activateAR();
        } else {
          alert('AR is not available in this browser.');
        }
      } catch (err) {
        console.error('AR launch failed:', err);
        alert('AR did not launch. On iPhone, use Safari. On Android, use Chrome.');
      }
    }

    function updateLEDPulse(elapsedTime) {
      const activeDiffusers = activeKey === 'tray' ? trayDiffusers : planterDiffusers;

      if (!activeDiffusers.length) {
        glowLight.visible = false;
        return;
      }

      // 1 full breath every 5.2 seconds
      const phase = (elapsedTime / 5.2) * Math.PI * 2 - Math.PI / 2;
      const breath = (Math.sin(phase) + 1) * 0.5;

      // more dramatic low-to-high curve
      const eased = Math.pow(breath, 2.6);

      // make "off" actually look dim/off
      const emissiveIntensity = 0.0 + eased * 1.2;
      const glowIntensity = 0.0 + eased * 1.4;

      // also animate visible surface brightness so it doesn't stay a flat white disc
      const surfaceLevel = 0.12 + eased * 0.88;
      const surfaceColor = new THREE.Color(surfaceLevel, surfaceLevel, surfaceLevel);

      for (const diffuser of activeDiffusers) {
        if (!diffuser.material) continue;

        diffuser.material.color.copy(surfaceColor);
        diffuser.material.emissive = new THREE.Color(0xffffff);
        diffuser.material.emissiveIntensity = emissiveIntensity;
        diffuser.material.opacity = 0.95;
        diffuser.material.transparent = true;
      }

      const worldPos = new THREE.Vector3();
      activeDiffusers[0].getWorldPosition(worldPos);

      glowLight.position.copy(worldPos);
      glowLight.intensity = glowIntensity;
      glowLight.distance = 0.55;
      glowLight.visible = glowIntensity > 0.02;
    }

    loader.load(
      './models/tray.glb',
      (gltf) => {
        const model = gltf.scene;

        trayWrapper = buildWrapper(model, [-1.24, -2.34, 0.16], 4.5, trayDiffusers);
        trayWrapper.visible = activeKey === 'tray';
        trayLoaded = true;
        updateFormState();

        if (activeKey === 'tray') {
          setActiveModel('tray');
        }

        console.log('tray loaded');
        console.log('tray diffusers found:', trayDiffusers.length);
      },
      undefined,
      (error) => {
        trayLoaded = false;
        updateFormState();
        console.error('Failed to load tray.glb:', error);
      }
    );

    loader.load(
      './models/planter.glb',
      (gltf) => {
        const model = gltf.scene;

        planterWrapper = buildWrapper(model, [0.14, -0.28, 0.03], 3.9, planterDiffusers);
        planterWrapper.visible = activeKey === 'planter';
        planterLoaded = true;
        updateFormState();

        if (activeKey === 'planter') {
          setActiveModel('planter');
        } else if (trayWrapper) {
          setActiveModel('tray');
        }

        console.log('planter loaded');
        console.log('planter diffusers found:', planterDiffusers.length);
      },
      undefined,
      (error) => {
        planterLoaded = false;
        updateFormState();
        console.warn('Failed to load planter.glb:', error);
      }
    );

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const t = clock.getElapsedTime();

      if (trayWrapper && trayWrapper.visible) {
        const base = trayWrapper.userData.baseRotation;
        trayWrapper.position.y = Math.sin(t * 0.45) * 0.05;
        trayWrapper.position.z = Math.cos(t * 0.24) * 0.02;
        trayWrapper.rotation.x = base.x + Math.sin(t * 0.18) * 0.006;
        trayWrapper.rotation.y = base.y + Math.sin(t * 0.42) * 0.028;
        trayWrapper.rotation.z = base.z + Math.cos(t * 0.20) * 0.004;
      }

      if (planterWrapper && planterWrapper.visible) {
        const base = planterWrapper.userData.baseRotation;
        planterWrapper.position.y = Math.sin(t * 0.40 + 0.8) * 0.045;
        planterWrapper.position.z = Math.cos(t * 0.22 + 0.3) * 0.02;
        planterWrapper.rotation.x = base.x + Math.sin(t * 0.16 + 0.2) * 0.006;
        planterWrapper.rotation.y = base.y + Math.sin(t * 0.38 + 0.4) * 0.026;
        planterWrapper.rotation.z = base.z + Math.cos(t * 0.18 + 0.2) * 0.004;
      }

      updateLEDPulse(t);

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      fitActiveModel();
    });

    materialBtn.addEventListener('click', toggleMaterial);
    formBtn.addEventListener('click', toggleForm);
    viewBtn.addEventListener('click', launchAR);

    applyMaterialToAllLoadedObjects();
    updateLightingForMaterial();
    syncARLauncher();
  </script>
</body>
</html>
